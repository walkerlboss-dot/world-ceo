name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Lint with flake8
      run: |
        flake8 scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 scripts/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Format check with black
      run: |
        black --check scripts/ tests/
    
    - name: Type check with mypy
      run: |
        mypy scripts/ --ignore-missing-imports
    
    - name: Test with pytest
      run: |
        pytest tests/ --cov=scripts --cov-report=xml --cov-report=term
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  integration:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Test agent generation
      run: |
        python scripts/agent_generator.py \
          --name "Test Agent" \
          --description "Integration test agent" \
          --category research \
          --pain-points "test pain" \
          --data-sources "test data" \
          --tools "test tool" \
          --target-users "testers"
    
    - name: Verify output
      run: |
        ls -la output/test_agent/
        test -f output/test_agent/SOUL.md
        test -f output/test_agent/AGENT.md
        test -f output/test_agent/skills/test_agent_skill.py
